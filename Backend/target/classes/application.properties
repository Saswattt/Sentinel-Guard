spring.application.name=Sentinel-Guard

# ===============================
# DATABASE CONNECTION (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/sentinel_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
# 'update' is great for dev, but use 'validate' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Fixed the typo in Dialect here:
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JAVA 25 OPTIMIZATION
# ===============================
# This enables lightweight Virtual Threads (Project Loom)
spring.threads.virtual.enabled=true

# ===============================
# SERVER & CORS CONFIG
# ===============================
server.port=8080
# Increased limits for modern API interactions
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# ACTUATOR (Monitoring)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,env,prometheus
management.endpoint.health.show-details=always
# Enables 'readiness' and 'liveness' probes (useful if you ever move to Docker/K8s)
management.endpoint.health.probes.enabled=true